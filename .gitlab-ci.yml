# comdare-cache-engine — GitLab CI/CD (REV 10, 2026-06-25): ci-templates-Lint + PMC-Smoke + Contract
# ─────────────────────────────────────────────────────────────────────────────
# REV 10 (Debug-Befunde Pipeline 6948):
#  - lint:secrets GRÜN (hermetischer gitleaks-Bootstrap real bewiesen).
#  - Artefakt-Object-Storage wirft nach dem Secret-Swap HTTP 500 „invalid argument" auf großen Uploads
#    (das `build/`-Artefakt der cache-engine ist riesig) → build+measure zu EINEM `pmc`-Job gemergt,
#    KEIN build/-Artefakt-Upload (Smoke-Beleg = ctest-Log). [Storage-Fix = Infra, Handoff geschrieben.]
#  - pmc:intel bis zum prod2-Runner-Fix per Variable gegatet (Infra spielt meinen SSH-Key auf prod2).
#  - contract: baut die ABI-Smoke-Tests + exakte ctest-Regex (vorher matchte 'abi' ungebaute Tests).
# measure-PMC bleibt erhalten (perf_event_open, bare-metal); der mehrtägige Voll-Mess-Lauf ist separat.

include:
  - project: 'comdare/cluster/ci-templates'
    ref: development
    file: '/base-pipeline.yml'

workflow:
  rules:
    - if: '$CI_COMMIT_TAG'
      when: never
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_PIPELINE_SOURCE == "web"'
    - if: '$CI_PIPELINE_SOURCE == "pipeline"'
    - if: '$CI_COMMIT_BRANCH'

stages:
  - lint
  - build
  - sanitize
  - contract
  - test           # CI-2 (#264): Voll-Suite via Sammel-Target comdare_tests (Probelauf, s. test:unit)
  - chaos          # Stufe 6 (#197, EPIC #186): Mess-Drift-Detektor + Rerun-Gate (Selbstheilung)

# #277/#21 (User 06.07.): ccache-Bestand auf dev-MinIO via runners.cache; projektlokales CCACHE_DIR fuer cache:-Sync.
cache:
  key: "ccache-$CI_PROJECT_NAME"
  paths: [".ccache"]

variables:
  CCACHE_DIR: "$CI_PROJECT_DIR/.ccache"
  CCACHE_MAXSIZE: "5G"
  GIT_SUBMODULE_STRATEGY: none
  CMAKE_BUILD_PARALLEL_LEVEL: "6"          # User 2026-07-06: 2x6 Kerne bei concurrent=2 (prod1 16C; revidiert 4@8-Kern-cgroup-Aera)
  COMDARE_LINT_PATHS: "libs apps tests adapters benchmark_suite benchmarks"
  # contract: ABI-Contract-Smoke = test_abi_interface (std::map/ABI-Interface-Kontrakt). test_v41_anatomy_module_abi
  # ist der schwerere anatomy-MODULE-Test (eigener Linux-Build) -> gehoert in den vollen Test-Stage/#179-Sweep,
  # NICHT in den Contract-Smoke. (REV 11: vorher zog er den mimalloc-Kettel-Include-Bug rein, jetzt gefixt.)
  COMDARE_CONTRACT_CMD: "cmake -B build-contract -G Ninja -DCOMDARE_BUILD_TESTS=ON && cmake --build build-contract --target test_abi_interface && ctest --test-dir build-contract -R '^test_abi_interface$' --output-on-failure -V"

# ── Stufe 1: Lint (aus ci-templates) ──
lint:secrets:
  extends: .lint-secrets
  tags: [baremetal]
lint:format:
  extends: .lint-format
  tags: [baremetal]
lint:static:
  extends: .lint-static
  tags: [baremetal]

# ── Bare-Metal-PMC-Smoke (build+measure in EINEM Job; KEIN großes Artefakt) ──
.bare_metal:
  before_script:
    - 'echo "== Host =="; uname -a; (lscpu | grep -E "Vendor ID|Model name") || true'
    - 'echo "== perf_event_paranoid =="; cat /proc/sys/kernel/perf_event_paranoid || true'
    - 'echo "== Toolchain =="; cmake --version; (g++ --version || c++ --version || echo "KEIN C++-Compiler"); (ninja --version || echo "kein ninja")'

# ── #273-T3 (2026-07-07): build:clang-Rollout — ce baut die Voll-Suite unter dem neuesten clang. ──
# OPT-IN + advisory (COMDARE_CLANG_MATRIX=="1", wie super-T1): destabilisiert die Hauptpipeline NICHT.
# clang-22.1.8 ist auf den bare-metal-Runnern vorhanden; lokal comdare_tests EXIT 0 bewiesen (07.07.).
# Der gcc-15.3-Pin (T2) ist SEPARAT + gcc-15.3-gated (HO-11) und NICHT Teil dieses Jobs.
build:clang:
  extends: .build-clang-latest
  stage: build
  tags: [baremetal]
  variables:
    COMDARE_CMAKE_SOURCE_DIR: "."
    COMDARE_AUDIT_BUILD_TYPE: "Release"
    COMDARE_CMAKE_CONFIGURE_FLAGS: "-G Ninja -DCOMDARE_BUILD_TESTS=ON"
    COMDARE_CMAKE_BUILD_TARGET: "comdare_tests"

.pmc:
  extends: .bare_metal
  stage: build
  timeout: 15m   # Härtung 2026-07-09: fail-fast statt 60min-Default. Ein hängender bare-metal-Node (prod2-configure-Hang 08.07., 3×60min verbrannt) failt so nach 15min statt eine Stunde je Pipeline zu blockieren. Normal-Lauf < 3min (configure 0.7s + smoke-Build + ctest).
  needs: ["lint:secrets"]   # Codex-Review 06-27: hart auf den Secrets-Gate warten (sonst läuft Build trotz Leak)
  script:
    - cmake -B build -G Ninja -DCOMDARE_BUILD_TESTS=ON -DCOMDARE_ENABLE_PMC=ON
    # Build-Parallelität via CMAKE_BUILD_PARALLEL_LEVEL=4 (Runner-Core-Budget, User 2026-06-25), NICHT -j nproc
    # M-CE-25 (Muster-F, 2026-07-13): m3v2_pmc_smoke (Label pmc) lief in KEINEM Job — test:unit schliesst es per
    # -LE pmc aus, kein dedizierter -R matchte es. Es beweist die geschlossene PMC-Naht im Lazy-WIDE-Pfad und
    # gehoert damit in den PMC-Gate. Mit COMDARE_ENABLE_PMC=ON (echte Quelle, available=1) ist der Naht-Beweis
    # scharf (Inversion-Fix: live-PMC = SMOKE_OK). Lokal gruen bewiesen.
    - cmake --build build --target linux_perf_pmc_smoke m3v2_pmc_smoke
    - ctest --test-dir build -R '^(linux_perf_pmc_smoke|m3v2_pmc_smoke)$' --output-on-failure -V
  # KEINE Artefakte: das build/-Tree-Artefakt scheiterte am Object-Storage-500 (post-swap). Beleg = ctest-Log.

pmc:amd:
  extends: .pmc
  tags: [baremetal, amd]

pmc:intel:
  extends: .pmc
  tags: [baremetal, intel]
  # prod2-Runner pullt seit Secret-Swap nicht (Infra spielt meinen SSH-Key auf .212 → dann Runner-Fix).
  # 2026-07-09: erneut deaktiviert (COMDARE_PROD2_AVAILABLE=false). Nach dem MinIO-prod→dev-Swap hängt der
  #   cmake-configure auf prod2 VOR der Compiler-ID (stale Mount/Node-Überlast) → 3× 60min-Timeout, Pipeline 9h rot.
  #   Beleg: gleicher sha 4d8aedce lief 20:36 grün (28s), ab 21:53 retriggert 60min-Kill; pmc:amd/prod1 grün.
  #   Echter Fix = Infra (prod2-Node), Handover docs/sessions/20260709-*. pmc:amd/prod1 hält die PMC-Coverage.
  # Reaktivieren (erst NACH prod2-Node-Fix + einem grünen Probe-Lauf): CI-Variable COMDARE_PROD2_AVAILABLE="true".
  rules:
    - if: '$COMDARE_PROD2_AVAILABLE == "true"'

# ── #270b (2026-07-07): 3-ISA-Teilmatrix-INSTANZIIERUNG — arm64-Smoke auf node7-rpi5-arm64 (tag arm64). ──
# OPT-IN + advisory: die HARTE Scharfschaltung als CI-PFLICHT ist ausdruecklich #276 (letzte Ledger-Aufgabe).
# Dieser Job destabilisiert die Hauptpipeline NICHT (rules-gated auf COMDARE_ISA_MATRIX=="true"), baut nur eine
# kleine, ISA-repraesentative Teilmenge (der cpuid/isa-Probe-Test + das Conformance-Gate) und laeuft ihn — der
# Beweis, dass der arm64-Toolchain-Pfad traegt. Bei node7-Freeze/Toolchain-Luecke: Runner-Endstrecke = Task #23
# (K87b-Montags-Audit); dieser Job bleibt dann instanziiert-aber-ungetriggert (kein Pipeline-Schaden).
build:arm64-smoke:
  stage: test
  tags: [arm64]
  needs: []
  allow_failure: true
  rules:
    - if: '$COMDARE_ISA_MATRIX == "true"'
  script:
    - 'echo "== arm64-Teilmatrix-Smoke auf $(uname -m) =="'
    - 'test "$(uname -m)" = "aarch64" || { echo "FEHLER: kein aarch64-Runner (uname=$(uname -m))"; exit 1; }'
    - _CC=cc; _CXX=c++; command -v g++-13 >/dev/null 2>&1 && { _CC=gcc-13; _CXX=g++-13; }
    - cmake -B build-arm64 -G Ninja -DCMAKE_C_COMPILER="$_CC" -DCMAKE_CXX_COMPILER="$_CXX" -DCOMDARE_BUILD_TESTS=ON
    - cmake --build build-arm64 --target test_cpuid_probe test_conformance_gate
    - ctest --test-dir build-arm64 -R "^(test_cpuid_probe|test_conformance_gate)$" --output-on-failure
  artifacts:
    paths: []

# ── Stufe 3b: Sanitize (ASan+UBSan, 10-Stufen-Prinzip P1b) — fängt Memory-/UB-Bugs ──
# advisory (allow_failure) bis #179-Bereinigung, danach HART. Eigener Debug+Sanitizer-Build, kein Artefakt.
# #278 (2026-07-06): HART geschaltet — Gruen-Beweise Pipelines 8190 UND 8191 (2x in Folge success).
sanitize:asan-ubsan:
  extends: .bare_metal
  stage: sanitize
  tags: [baremetal]
  needs: ["lint:secrets"]   # Codex-Review 06-27: hart auf den Secrets-Gate warten (sonst läuft Build trotz Leak)
  script:
    - cmake -B build-san -G Ninja -DCOMDARE_BUILD_TESTS=ON -DCMAKE_BUILD_TYPE=Debug -DCMAKE_CXX_FLAGS="-fsanitize=address,undefined -fno-omit-frame-pointer -fno-sanitize-recover=all" -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address,undefined"
    # #204/264-b: Target-Liste um die 5 schnellen, contract-gruen-bewiesenen Gates erweitert (advisory).
    - cmake --build build-san --target test_abi_interface test_config_durability test_conformance_gate test_experiment_driver_v13 test_chaos_drift_gate
    - 'ASAN_OPTIONS=detect_leaks=1 UBSAN_OPTIONS=print_stacktrace=1 ctest --test-dir build-san -R "^(test_abi_interface|test_config_durability|test_conformance_gate|test_experiment_driver_v13|test_chaos_drift_gate)$" --output-on-failure -V'

# ── Stufe 4: Contract (aus ci-templates; ABI-Smoke eigenständig, kein großes Artefakt) ──
contract:
  extends: .contract
  tags: [baremetal]
  needs: ["lint:secrets"]   # Codex-Review 06-27: hart auf den Secrets-Gate warten (sonst läuft Build trotz Leak)
  artifacts:
    paths: []     # Override: kein build/Testing/-Artefakt (Storage-500 + Pfad-Mismatch zu build-contract)

# ── Stufe 4b: Contract config-durability-Gate (#195, Pipeline P0 / EPIC #186) ──
# Müll-/kaputte Config-XMLs duerfen die Parser (cx::parse_document + wd::parse_load_profile) NICHT
# crashen (Segfault/UB), sondern muessen sauber nullopt liefern. Eigenstaendiger Bau des GTest-
# Negativtests test_config_durability (kein grosses Artefakt). Crash an einer Müll-Config = Prozess
# stirbt = ctest FAILED = CI rot → das Gate faengt eine Robustheits-Regression VOR dem Mess-/Deploy-
# Pfad ab. Mirror der .pmc-/contract-Konventionen (eigener Build, kein Artefakt, lint:secrets-Gate).
contract:durability:
  extends: .bare_metal
  stage: contract
  tags: [baremetal]
  needs: ["lint:secrets"]   # hart auf den Secrets-Gate warten (Konvention wie .pmc/contract)
  script:
    # Build-Parallelitaet via globalem CMAKE_BUILD_PARALLEL_LEVEL (Runner-Core-Budget), NICHT -j nproc.
    - cmake -B build-dur -G Ninja -DCOMDARE_BUILD_TESTS=ON
    - cmake --build build-dur --target test_config_durability
    - ctest --test-dir build-dur -R '^test_config_durability$' --output-on-failure -V
  artifacts:
    paths: []     # kein build/Testing/-Artefakt (Storage-500-Konvention der anderen contract-Jobs)

# ── Stufe 4c: Contract Konformitaets-Gate-Regression (#223, Pipeline P0 / EPIC #186) ──
# Das std::map-Konformitaets-Gate (import->GATE->messen, builder/pruef_dock/conformance_gate.hpp) MUSS
# nicht-konforme Tier-Huellen FANGEN — sonst rutschten ungueltige Lebewesen als gueltige Mess-Zeilen durch
# (Meta-Lehre #3). test_conformance_gate treibt eine konforme std::map-Huelle (muss bestehen) + gezielt
# defekte Huellen (muessen gefangen werden) durch run_conformance_gate; faengt das Gate eine Nicht-Konformitaet
# NICHT, ist der Test rot = CI rot. Reines C++/std::map (Linux-g++), kein cl/thesis_tiere-Harness -> schliesst
# die Harness-CI-Verifikationsluecke fuer genau diesen Konformitaets-Contract. Mirror der .pmc-/contract-Konv.
# #188-4c-0 (2026-07-02): +test_188_4c0_known_compositions_conformance — alle 11 Reference-/PaperBinding-
# Compositions durch dasselbe Gate am realen Adapter (Sicherheitsnetz fuer den Spiegel-Abbau #188-4c;
# seit #188-4c-i routes_through_store==true: Huellen container_-authoritativ). Exakter 2-Target-Regex (bb0-Lehre).
contract:conformance:
  extends: .bare_metal
  stage: contract
  tags: [baremetal]
  needs: ["lint:secrets"]   # hart auf den Secrets-Gate warten (Konvention wie .pmc/contract/durability)
  script:
    # Build-Parallelitaet via globalem CMAKE_BUILD_PARALLEL_LEVEL (Runner-Core-Budget), NICHT -j nproc.
    # #188-4c-0b (2026-07-02): Known-Compositions duerfen Paper-Original-Wrapper auch ohne ext-Submodule
    # kompilieren. is_original-Mixins sind jetzt per COMDARE_A06/A03A/AQ1_IS_ORIGINAL_CODEGEN gegated;
    # kein CI-Erzwingen von ORIGINAL_CODE_VALIDATION=ON, weil ext/ im Runner leer sein kann.
    # #188-4c-ii (2026-07-02): +test_188_4cii_flat_wrapper_traversal — die 4 Flach-Wrapper store-traversierbar
    # (DirectAddress-/SortedVectorTraversal); exakter 3-Target-Regex (bb0-Lehre).
    - cmake -B build-conf -G Ninja -DCOMDARE_BUILD_TESTS=ON
    # #216-H2 (2026-07-03): +test_216h2_stat_reset_after_load (daten-erhaltender Stat-Reset nach Load belegt) +
    # test_v41_anatomy_module_abi (ABI-Major 3->4 Loader-Reject-Verifikation).
    # #267 CMD-1-a (2026-07-06): +test_cmd1_a_axis_command_base — Compile-time-Command-Vertrag der Achsen
    # (AxisCommand ueber 27 AxisBase-Erben, Mess-Visitor-Slot, AxisLimitations). Befund 8073/Job 213476: das
    # Label 'contract' allein laesst KEINEN CI-Job den Test fahren (Jobs bauen gezielte Targets) -> explizit
    # hier aufgenommen (User-Direktive: Tests nie auslassen).
    # M-CE-25 (Muster-F, 2026-07-13): +test_ap15_2_get_allocator_proxy +test_ap15_3_driveable_map_contract
    # +test_29_container_framework — contract-gelabelt, aber von KEINEM -R-Job gefahren (test:unit -LE contract).
    # Hier in den Konformitaets-Gate aufgenommen (Container-/Allocator-Proxy-Vertraege). Lokal gruen bewiesen.
    - cmake --build build-conf --target test_conformance_gate test_188_4c0_known_compositions_conformance test_188_4cii_flat_wrapper_traversal test_216h2_stat_reset_after_load test_v41_anatomy_module_abi test_cmd1_a_axis_command_base test_ap15_2_get_allocator_proxy test_ap15_3_driveable_map_contract test_29_container_framework
    - ctest --test-dir build-conf -R '^(test_conformance_gate|test_188_4c0_known_compositions_conformance|test_188_4cii_flat_wrapper_traversal|test_216h2_stat_reset_after_load|test_v41_anatomy_module_abi|test_cmd1_a_axis_command_base|test_ap15_2_get_allocator_proxy|test_ap15_3_driveable_map_contract|test_29_container_framework)$' --output-on-failure -V
  artifacts:
    paths: []     # kein build/Testing/-Artefakt (Storage-500-Konvention der anderen contract-Jobs)

# ── Stufe 4d: Contract Pool-Adapter-Flip Compile-Gate (#188-4b-b-V, Pipeline P0 / EPIC #186) ──
# Der 4b-b1b-container_-Flip (anatomy/abi_adapter.hpp) stellt fuer die 9 Weg-B-Pool-Familien (roher search_algo-
# Wrapper → pool_family_==true) container_ auf ObservableComposedContainer<organ_for_search_algo_t<S>> (natives u64-
# Organ, via lazy type_identity/conditional_t) um und routet insert/lookup/erase/T0-Observer/T0-Segment-Timing ueber
# container_is_authoritative_. Explore+Codex-Befund: KEIN anderes CI-Target instanziiert diesen Pool-Zweig DURCH den
# ABI-Adapter (test_conformance_gate = k-ary/organ==void; abi_interface/durability/chaos/pmc nutzen den Adapter nicht;
# tier150 = Organ-Huelle/pool_family_==false) → der Flip war nur Codex-/static_assert-verifiziert, NIE compiliert.
# test_188_4bbV instanziiert SearchAlgorithmAbiAdapter<SearchAlgorithmAnatomy<PoolFlipComposition<W>>> fuer ALLE 9
# Pool-Familien und treibt jeden ueber insert/lookup/erase/size/clear + tier_observe → erzwingt die Template-
# Instanziierung des Pool-Zweigs. Ein type_identity-/Routing-Compile-Fehler ODER eine Smoke-Regression = ctest FAILED
# = CI rot → das Gate faengt eine Flip-Regression VOR dem 320-DLL-Mess-Lauf (#215) ab. COMDARE_MEASUREMENT_ON (CMake)
# aktiviert IObservableTier + den Segment-Timing-Pfad. Mirror der contract:conformance-Konventionen (eigener Build,
# kein Artefakt, lint:secrets-Gate).
# #188-4a (2026-07-02): +test_188_4a_eytzinger_organ — Eytzinger als 10. organ_for-Familie (EytzingerLayoutStore,
# Option b lazy rebuild): std::map-Konformitaet + Wrapper-Aequivalenz + dirty-Semantik + for_each_record-Ernte
# (DEG-1-Fix fuer den einzigen golden-320-Algo mit keys={0}-Degeneration). Gleicher Job (188-Familien-Gate).
contract:pool_flip:
  extends: .bare_metal
  stage: contract
  tags: [baremetal]
  needs: ["lint:secrets"]   # hart auf den Secrets-Gate warten (Konvention wie .pmc/contract/durability/conformance)
  script:
    # Build-Parallelitaet via globalem CMAKE_BUILD_PARALLEL_LEVEL (Runner-Core-Budget), NICHT -j nproc.
    - cmake -B build-poolflip -G Ninja -DCOMDARE_BUILD_TESTS=ON
    # M-CE-25 (Muster-F, 2026-07-13): +test_s7_1..10 (die 10 Pool-Alloc-DEG-Gates, Label contract;pool_flip) —
    # liefen in KEINEM Job (test:unit -LE contract, kein dedizierter -R). Gehoeren fachlich in den Pool-Flip-Gate.
    # Lokal alle 10 gruen bewiesen.
    - cmake --build build-poolflip --target test_188_4bbV_pool_adapter_flip_compile test_188_4a_eytzinger_organ test_s7_1_bst_pool_allocator_deg test_s7_2_btree_pool_allocator_deg test_s7_3_skip_list_pool_allocator_deg test_s7_4_hash_pool_allocator_deg test_s7_5_art_pool_allocator_deg test_s7_6_hot_pool_allocator_deg test_s7_7_start_pool_allocator_deg test_s7_8_wormhole_pool_allocator_deg test_s7_9_surf_pool_allocator_deg test_s7_10_swiss_pool_allocator_deg
    # Exakter Match (Review-Fix): '^test_188_4' matchte auch test_188_4bb0_… (hier nicht gebaut). test_s7_ exakt.
    - ctest --test-dir build-poolflip -R '^(test_188_4bbV_pool_adapter_flip_compile|test_188_4a_eytzinger_organ|test_s7_([1-9]|10)_)' --output-on-failure -V
  artifacts:
    paths: []     # kein build/Testing/-Artefakt (Storage-500-Konvention der anderen contract-Jobs)

# -- Stufe 4e: Contract Harness Compile+Smoke-Gate (#230-Rest, W1 vor Node-Shape-Achsen) --
# E4-Luecke: conformance/pool_flip compilierten Gate+ABI/Organe, aber NICHT den Host-Treiber-Stack des
# thesis_tiere-Harness (cache_engine_builder_iterator.hpp, perm_runner.hpp und Kontext wie ExperimentTree/
# Result-Ingest/Workload/PMC). test_harness_compile zieht diese schweren Header in einem isolierten Linux-g++-
# Contract-Build und macht nur side-effect-freie Smokes (Registry->Tree/View, PermResult, lazy_csv_header,
# format_csv_row). Kein run_lazy, keine DLLs, keine Messung, keine CSV-Dateien. Mirror von contract:pool_flip:
# eigener Build-Ordner, lint:secrets-Gate, keine Artefakte.
contract:harness:
  extends: .bare_metal
  stage: contract
  tags: [baremetal]
  needs: ["lint:secrets"]   # hart auf den Secrets-Gate warten (Konvention wie .pmc/contract/durability/conformance)
  script:
    # Build-Parallelitaet via globalem CMAKE_BUILD_PARALLEL_LEVEL (Runner-Core-Budget), NICHT -j nproc.
    - cmake -B build-harness -G Ninja -DCOMDARE_BUILD_TESTS=ON
    # F18/WP-0 (Voll-Audit 2026-07-16): +test_lazy_resume_binary (M-CE-05, Labels contract;standalone;harness;
    # resume — von test:unit -LE contract ausgeschlossen, lief in KEINEM -R-Job). Heimat = der Harness-Gate.
    - cmake --build build-harness --target test_harness_compile test_lazy_resume_binary
    - ctest --test-dir build-harness -R '^(test_harness_compile|test_lazy_resume_binary)$' --output-on-failure -V
  artifacts:
    paths: []     # kein build/Testing/-Artefakt (Storage-500-Konvention der anderen contract-Jobs)

contract:profile_coverage:
  extends: .bare_metal
  stage: contract
  tags: [baremetal]
  needs: ["lint:secrets"]   # hart auf den Secrets-Gate warten (Konvention wie .pmc/contract/durability/conformance)
  script:
    # Build-Parallelitaet via globalem CMAKE_BUILD_PARALLEL_LEVEL (Runner-Core-Budget), NICHT -j nproc.
    - cmake -B build-cov -G Ninja -DCOMDARE_BUILD_TESTS=ON
    # M-CE-25 (Muster-F, 2026-07-13): +test_smoke_coverage_profile +test_wdk_datasets_fairness +test_sota_st2_dedup
    # +test_validate_profile +test_h2_score_akte — alle contract;profiles-gelabelt, aber von KEINEM -R-Job gefahren
    # (test:unit -LE contract). Gehoeren in den Profil-Coverage-Gate (Profil-/E4-Vertraege). Lokal alle gruen bewiesen.
    # M-CE-27 (Muster-F, 2026-07-15): +test_profile_roundtrip — das HARTE golden-320-Roundtrip-Gate des PROFIL-Pfads
    # (m3v2_study.profile.xml -> parse_thesis_profile -> StaticBinaryView == 320 binary_ids POSITIONSIDENTISCH zur
    # eingefrorenen Golden-Liste; #139-Resume-Schutz). Das EXCLUDE_FROM_ALL-Adhoc-Target lief in KEINEM -R-Job: nur
    # der comdare_tests-Sammel-Sweep (test:unit) zog es implizit mit, es gab KEIN dediziertes golden-Gate. Hier als
    # expliziter -R-Gate im semantisch passenden Profil/Validierungs-Job gehoben (Target zur Build-Liste + Name in
    # den -R-Regex). Das +contract-Label (tests/unit/CMakeLists.txt) haelt es aus test:unit -LE contract raus ->
    # laeuft in GENAU DIESEM einen Job. Profil-XML + Golden-Liste werden NUR GELESEN (golden-320 TABU). Lokal gruen.
    # F18/WP-0 (Voll-Audit 2026-07-16, Muster-F 4. Loch): +test_experiment_parser (INC-D comdare_experiment-
    # Parser-Modul + validate gegen die REALEN Registries) +test_measurement_categories (INC-3) — beide
    # contract;profiles;e4-gelabelt (raus aus test:unit -LE contract), aber von KEINEM -R-Job gefahren ->
