# ── CI-2 (#264/264-b): Voll-Suite-PROBELAUF via Sammel-Target comdare_tests (base-pipeline .test-Template). ──
# CI-6-Konvention: allow_failure bis zum ersten dokumentierten Gruen-Beweis; Hard-Gate erst nach 264-d
# (-j/RAM-Politik CI-5 + #179). Ehrlicher Ist-Stand beim Anlegen (Commit 8669210d): comdare_tests baut
# 788/788; ctest-Vollauf lokal 126/184 passed, 58 Laufzeit-Fails (Inventar im Ledger) -- dieser Job macht
# den Stand pipeline-sichtbar, behauptet aber KEIN Gruen.
