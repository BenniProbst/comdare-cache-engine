# comdare-cache-engine — GitLab CI/CD (REV 9, 2026-06-25): ci-templates-Lint/Contract + PMC-Mess-Flow
# ─────────────────────────────────────────────────────────────────────────────
# Bindet die wiederverwendbaren Stage-Templates (EPIC #186) ein und bewahrt den bewiesenen
# Production-Bare-Metal-PMC-Mess-Flow (prod1/AMD id=16, prod2/Intel id=17, shell, perf_event_open).
#
# WICHTIG: Die lokalen PMC-Jobs heißen `.ce_build`/`.ce_measure` (NICHT `.build`/`.measure`),
# um Namens-Kollision mit dem Template-`.build` aus base-pipeline.yml zu vermeiden.
# Lint: gitleaks HART · clang-format/cppcheck ADVISORY (allow_failure) bis zum #179-Format-Pass.

include:
  - project: 'comdare/cluster/ci-templates'
    ref: development
    file: '/base-pipeline.yml'

workflow:
  rules:
    - if: '$CI_COMMIT_TAG'
      when: never
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_PIPELINE_SOURCE == "web"'
    - if: '$CI_PIPELINE_SOURCE == "pipeline"'        # cross-project-Trigger (Super → cache-engine)
    - if: '$CI_COMMIT_BRANCH'

stages:
  - lint
  - build
  - measure
  - contract

variables:
  GIT_SUBMODULE_STRATEGY: none
  CMAKE_BUILD_PARALLEL_LEVEL: "8"
  # cache-engine-eigene Quellpfade (ext/, build/, modules/ schließt das Template-Regex aus)
  COMDARE_LINT_PATHS: "libs apps tests adapters benchmark_suite benchmarks"
  # contract: ABI-Contract-Smoke (test_abi_interface) eigenständig konfigurieren+bauen+prüfen
  COMDARE_CONTRACT_CMD: "cmake -B build-contract -G Ninja -DCOMDARE_BUILD_TESTS=ON && cmake --build build-contract --target test_abi_interface && ctest --test-dir build-contract -R 'abi' --output-on-failure -V"

# ── Stufe 1: Lint (aus ci-templates) ──
lint:secrets:
  extends: .lint-secrets
  tags: [baremetal]
lint:format:
  extends: .lint-format
  tags: [baremetal]
  allow_failure: true        # advisory bis #179-Format-Pass (.clang-format-Einführung)
lint:static:
  extends: .lint-static
  tags: [baremetal]
  allow_failure: true

# ── Bare-Metal-PMC-Mess-Flow (BEWAHRT, lokal — wegen perf_event_open NICHT aus dem Template) ──
.bare_metal:
  before_script:
    - 'echo "== Host =="; uname -a; (lscpu | grep -E "Vendor ID|Model name") || true'
    - 'echo "== perf_event_paranoid =="; cat /proc/sys/kernel/perf_event_paranoid || true'
    - 'echo "== Toolchain =="; cmake --version; (g++ --version || c++ --version || echo "KEIN C++-Compiler"); (ninja --version || echo "kein ninja")'

.ce_build:
  extends: .bare_metal
  stage: build
  needs: []
  script:
    - cmake -B build -G Ninja -DCOMDARE_BUILD_TESTS=ON -DCOMDARE_ENABLE_PMC=ON
    # KEIN -j nproc (User 2026-06-25): Build-Parallelität = CMAKE_BUILD_PARALLEL_LEVEL (8 = halbes
    # Ubuntu-16-Kern-Budget); Runner-cgroup + concurrent=2 erzwingen die echte Aufteilung (Infra #189).
    - cmake --build build --target linux_perf_pmc_smoke
  artifacts:
    paths: [build/]
    expire_in: 1 day
  cache:
    key: "ce-build-$CI_JOB_NAME"
    paths: [build/]

build:amd:
  extends: .ce_build
  tags: [baremetal, amd]

build:intel:
  extends: .ce_build
  tags: [baremetal, intel]

.ce_measure:
  extends: .bare_metal
  stage: measure
  script:
    - ctest --test-dir build -R '^linux_perf_pmc_smoke$' --output-on-failure -V
  artifacts:
    when: always
    paths: [build/Testing/]
    expire_in: 1 week

measure:amd:
  extends: .ce_measure
  tags: [baremetal, amd]
  needs: ["build:amd"]

measure:intel:
  extends: .ce_measure
  tags: [baremetal, intel]
  needs: ["build:intel"]

# ── Stufe 4: Contract (aus ci-templates; ABI-Smoke eigenständig) ──
contract:
  extends: .contract
  tags: [baremetal]
  needs: []
