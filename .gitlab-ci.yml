# comdare-cache-engine — GitLab CI/CD (REV 8, 2026-06-24): Production-Bare-Metal-Mess-Flow
# ─────────────────────────────────────────────────────────────────────────────
# Baut + misst die cache-engine auf den prod-Bare-Metal-Runnern (prod1/AMD = id=16, prod2/Intel = id=17,
# shell-Executor, echte HW-Performance-Counter via perf_event_open). Ergebnis-Artefakte konsumiert die
# Diplomarbeit (Super-Repo) als LOSE externe Abhaengigkeit (cache-engine = Submodul, separat gebaut+gemessen).
#
# Designentscheidungen (Fix der vorherigen REV-7.6-Probleme):
#  - workflow-Regeln: KEINE Pipeline pro Tag (verhindert die Tag-Push-Flut) — nur Branch/MR/Web/cross-project.
#  - Jobs ENTKOPPELT via `needs` (kein Blockieren hinter untagged Docker-Stages, die es nicht mehr gibt).
#  - GIT_SUBMODULE_STRATEGY: none beim Smoke (prt-art-Pruefling wird erst fuer den Voll-Mess-Lauf gezogen;
#    .gitmodules-URLs muessen dafuer erst auf GitLab/relativ zeigen — Air-Gap, separater Schritt).
#  - Kein Docker-`image:` in den Bare-Metal-Jobs (shell-Executor) → echte HW-PMC.

workflow:
  rules:
    - if: '$CI_COMMIT_TAG'
      when: never
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_PIPELINE_SOURCE == "web"'
    - if: '$CI_PIPELINE_SOURCE == "pipeline"'        # cross-project-Trigger (Super → cache-engine)
    - if: '$CI_COMMIT_BRANCH'

stages:
  - build
  - measure

variables:
  GIT_SUBMODULE_STRATEGY: none
  CMAKE_BUILD_PARALLEL_LEVEL: "8"

# Gemeinsame Bare-Metal-Diagnose: zeigt bei JEDEM Lauf CPU-Vendor / perf_event_paranoid / Toolchain →
# ein Fehlschlag weist CE-DL1 (Toolchain) bzw. CE-DL2 (perf-Rechte: paranoid<=1 ODER CAP_PERFMON) direkt aus.
.bare_metal:
  before_script:
    - 'echo "== Host =="; uname -a; (lscpu | grep -E "Vendor ID|Model name") || true'
    - 'echo "== perf_event_paranoid =="; cat /proc/sys/kernel/perf_event_paranoid || true'
    - 'echo "== Toolchain =="; cmake --version; (g++ --version || c++ --version || echo "KEIN C++-Compiler"); (ninja --version || echo "kein ninja")'

# ── Stage build: konfigurieren + linux_perf_pmc_smoke bauen (PMC AN) ──
.build:
  extends: .bare_metal
  stage: build
  needs: []
  script:
    - cmake -B build -G Ninja -DCOMDARE_BUILD_TESTS=ON -DCOMDARE_ENABLE_PMC=ON
    - cmake --build build --target linux_perf_pmc_smoke -j "$(nproc)"
  artifacts:
    paths: [build/]
    expire_in: 1 day
  cache:
    key: "ce-build-$CI_JOB_NAME"
    paths: [build/]

build:amd:
  extends: .build
  tags: [baremetal, amd]

build:intel:
  extends: .build
  tags: [baremetal, intel]

# ── Stage measure: PMC-Smoke ausfuehren (reale Cache-Misses bzw. ehrlicher Skip) ──
.measure:
  extends: .bare_metal
  stage: measure
  script:
    - ctest --test-dir build -R '^linux_perf_pmc_smoke$' --output-on-failure -V
  artifacts:
    when: always
    paths: [build/Testing/]
    expire_in: 1 week

measure:amd:
  extends: .measure
  tags: [baremetal, amd]
  needs: ["build:amd"]

measure:intel:
  extends: .measure
  tags: [baremetal, intel]
  needs: ["build:intel"]
